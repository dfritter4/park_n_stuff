server {
    listen ${PORT};
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Vite emits content-hashed filenames under /assets, so these are safe
    # to cache aggressively and immutably.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # SPA fallback: let the client-side router handle unknown paths.
    location / {
        try_files $uri /index.html;
    }
}
